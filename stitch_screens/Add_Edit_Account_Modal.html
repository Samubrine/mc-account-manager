<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Add/Edit Account Modal</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#135bec",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
                    backdropBlur: {
                        'xs': '2px',
                    }
                },
            },
        }
    </script>
<style>::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.02);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen flex items-center justify-center relative overflow-hidden">
<div class="absolute inset-0 z-0 bg-cover bg-center pointer-events-none opacity-50 dark:opacity-30" data-alt="Abstract dark blue and purple geometric background pattern" style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAO7jgQAcW1isBu_AR9c411vgL9RrQvQc9523U4ytm1MxjStI_zlIvs5mMcbWPlgBizvZH3xLEvl7-4I-y2oHlBEAjGgjsOZJvLw9xZw700JFEtkAzWNSedBvrjTeSu6VP-hyJDXgC1HB_NoJDRLsOuE133uXpcZtQKejcpLk1dsTCdJLwl-ufxhI4q8Nx3S1NwDzcYYYxvYVpZzPRIMstWqogY-cPPt9J_Qb-AR5Is4RspsYqgfv9tue3S3RNOI3aHzi7ZzJ20BT-t');">
</div>
<div class="absolute inset-0 z-10 bg-slate-900/60 backdrop-blur-sm"></div>
<div class="relative z-20 w-full max-w-[520px] m-4">
<div class="bg-slate-900/60 dark:bg-[#151a25]/80 backdrop-blur-xl border border-white/10 dark:border-white/5 rounded-2xl shadow-2xl overflow-hidden flex flex-col">
<div class="px-8 pt-8 pb-2 flex justify-between items-center">
<div>
<h2 class="text-slate-900 dark:text-white text-2xl font-bold tracking-tight">Add Account</h2>
<p class="text-slate-500 dark:text-slate-400 text-sm mt-1">Enter your credentials to connect a new profile.</p>
</div>
<button class="text-slate-400 hover:text-white transition-colors rounded-full p-2 hover:bg-white/5">
<span class="material-symbols-outlined" style="font-size: 24px;">close</span>
</button>
</div>
<div class="px-8 py-6 space-y-5">
<div class="space-y-2">
<label class="block text-sm font-medium text-slate-700 dark:text-slate-200">Username</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined" style="font-size: 20px;">person</span>
</div>
<input class="block w-full pl-11 pr-4 py-3.5 bg-white/50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-xl text-slate-900 dark:text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all shadow-sm" placeholder="Enter Minecraft username" type="text"/>
</div>
</div>
<div class="space-y-2">
<label class="block text-sm font-medium text-slate-700 dark:text-slate-200">Email Address</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined" style="font-size: 20px;">mail</span>
</div>
<input class="block w-full pl-11 pr-4 py-3.5 bg-white/50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-xl text-slate-900 dark:text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all shadow-sm" placeholder="name@example.com" type="email"/>
</div>
</div>
<div class="space-y-2">
<label class="block text-sm font-medium text-slate-700 dark:text-slate-200">Password</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined" style="font-size: 20px;">lock</span>
</div>
<input class="block w-full pl-11 pr-12 py-3.5 bg-white/50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-xl text-slate-900 dark:text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all shadow-sm" placeholder="••••••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400 hover:text-slate-200 transition-colors">
<span class="material-symbols-outlined" style="font-size: 20px;">visibility_off</span>
</button>
</div>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-5">
<div class="space-y-2">
<label class="block text-sm font-medium text-slate-700 dark:text-slate-200">Account Type</label>
<div class="relative">
<select class="block w-full pl-4 pr-10 py-3.5 bg-white/50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-xl text-slate-900 dark:text-white focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all appearance-none shadow-sm cursor-pointer">
<option disabled="" selected="" value="">Select type</option>
<option value="microsoft">Microsoft</option>
<option value="mojang">Mojang</option>
<option value="offline">Offline</option>
<option value="mfa">MFA</option>
<option value="xbox">Xbox Gamepass</option>
</select>
<div class="absolute inset-y-0 right-0 flex items-center px-4 pointer-events-none text-slate-400">
<span class="material-symbols-outlined" style="font-size: 24px;">arrow_drop_down</span>
</div>
</div>
</div>
<div class="space-y-2">
<label class="block text-sm font-medium text-slate-700 dark:text-slate-200 opacity-50 transition-opacity peer-has-[:checked]:opacity-50 has-[input:disabled]:opacity-40">Ban Expires In</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 transition-colors">
<span class="material-symbols-outlined" style="font-size: 20px;">calendar_today</span>
</div>
<input class="block w-full pl-11 pr-4 py-3.5 bg-white/50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-xl text-slate-900 dark:text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all shadow-sm [color-scheme:dark] disabled:opacity-40 disabled:cursor-not-allowed disabled:bg-slate-900/30" disabled="" id="ban-date" type="datetime-local"/>
</div>
</div>
</div>
<div class="pt-2">
<label class="flex items-center space-x-3 cursor-pointer group">
<div class="relative">
<input checked="" class="sr-only peer" id="unbanned-toggle" onchange="document.getElementById('ban-date').disabled = this.checked; document.getElementById('ban-date').parentElement.parentElement.classList.toggle('opacity-50', this.checked)" type="checkbox"/>
<div class="w-10 h-6 bg-slate-200 dark:bg-slate-700 rounded-full peer peer-focus:ring-2 peer-focus:ring-primary/30 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-0.5 after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
</div>
<span class="text-sm font-medium text-slate-600 dark:text-slate-300 group-hover:text-slate-900 dark:group-hover:text-white transition-colors">Unbanned</span>
</label>
</div>
</div>
<div class="px-8 pb-8 pt-2 flex items-center justify-end gap-3">
<button class="px-6 py-3 rounded-xl text-sm font-medium text-slate-700 dark:text-slate-300 hover:text-slate-900 dark:hover:text-white bg-transparent hover:bg-slate-200/50 dark:hover:bg-slate-700/50 border border-transparent hover:border-slate-300 dark:hover:border-slate-600 transition-all duration-200">
                    Cancel
                </button>
<button class="px-8 py-3 rounded-xl text-sm font-semibold text-white bg-gradient-to-r from-primary to-blue-600 hover:from-blue-600 hover:to-primary shadow-lg shadow-primary/25 hover:shadow-primary/40 transition-all duration-300 transform hover:-translate-y-0.5">
                    Save Account
                </button>
</div>
<div class="h-1 w-full bg-gradient-to-r from-transparent via-primary to-transparent opacity-50"></div>
</div>
</div>
</body></html>
