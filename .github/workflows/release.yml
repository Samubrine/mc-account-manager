name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules
        run: npm run rebuild

      - name: Build application
        run: npm run build

      - name: Prepare release metadata
        id: meta
        shell: pwsh
        run: |
          $pkg = Get-Content package.json -Raw | ConvertFrom-Json
          $version = $pkg.version
          $tag = "v$version-build-$env:GITHUB_RUN_NUMBER"
          $name = "MC Account Manager v$version (build $env:GITHUB_RUN_NUMBER)"

          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "name=$name" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mc-account-manager-${{ steps.meta.outputs.tag }}
          path: release/**

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.name }}
          generate_release_notes: true
          files: |
            release/**/*.exe
            release/**/*.yml
            release/**/*.blockmap
